version: '3.8'

services:
  fsq-site:
    build:
      context: .
      dockerfile: Dockerfile
    image: fsq-site:latest
    container_name: fsq-site
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "com.fsq.description=FSQ Site - Full-Self Quality Marketing Site"
      - "com.fsq.version=1.0.0"
